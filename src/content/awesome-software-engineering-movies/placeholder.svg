<?xml version="1.0" encoding="UTF-8"?>
<!--
  Static placeholder shown when no YouTube thumbnail is available
  for an entry (no YouTube primary link, no youtubeTrailerForThumbnail,
  or both downloads failed). NOT regenerated by the tool: this file
  is a committed asset. Edit by hand to change the look.
  Aspect ratio matches YouTube hqdefault.jpg (4:3).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Poster unavailable">
  <rect width="480" height="360" fill="#1f2933"/>

  <!-- Filmstrip top and bottom borders -->
  <g fill="#0b1117">
    <rect x="0"   y="0"   width="480" height="40"/>
    <rect x="0"   y="320" width="480" height="40"/>
  </g>
  <g fill="#1f2933">
    <!-- Top sprocket holes -->
    <rect x="20"  y="10" width="30" height="20" rx="3"/>
    <rect x="70"  y="10" width="30" height="20" rx="3"/>
    <rect x="120" y="10" width="30" height="20" rx="3"/>
    <rect x="170" y="10" width="30" height="20" rx="3"/>
    <rect x="220" y="10" width="30" height="20" rx="3"/>
    <rect x="270" y="10" width="30" height="20" rx="3"/>
    <rect x="320" y="10" width="30" height="20" rx="3"/>
    <rect x="370" y="10" width="30" height="20" rx="3"/>
    <rect x="420" y="10" width="30" height="20" rx="3"/>
    <!-- Bottom sprocket holes -->
    <rect x="20"  y="330" width="30" height="20" rx="3"/>
    <rect x="70"  y="330" width="30" height="20" rx="3"/>
    <rect x="120" y="330" width="30" height="20" rx="3"/>
    <rect x="170" y="330" width="30" height="20" rx="3"/>
    <rect x="220" y="330" width="30" height="20" rx="3"/>
    <rect x="270" y="330" width="30" height="20" rx="3"/>
    <rect x="320" y="330" width="30" height="20" rx="3"/>
    <rect x="370" y="330" width="30" height="20" rx="3"/>
    <rect x="420" y="330" width="30" height="20" rx="3"/>
  </g>

  <!-- Clapperboard glyph -->
  <g transform="translate(180 110)" fill="none" stroke="#a3b3c2" stroke-width="3" stroke-linejoin="round">
    <rect x="0" y="20" width="120" height="80" rx="4"/>
    <path d="M0 28 L120 8 L120 28 Z" fill="#a3b3c2"/>
    <line x1="20" y1="8" x2="35" y2="28" stroke="#1f2933"/>
    <line x1="50" y1="5" x2="65" y2="25" stroke="#1f2933"/>
    <line x1="80" y1="2" x2="95" y2="22" stroke="#1f2933"/>
  </g>

  <!-- Caption -->
  <text x="240" y="260"
        font-family="Helvetica, Arial, sans-serif"
        font-size="24"
        font-weight="600"
        fill="#a3b3c2"
        text-anchor="middle">Poster unavailable</text>
</svg>
